<!doctype html><html lang="pt-br"><head><link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"/><meta charset="utf-8"/><link rel="apple-touch-icon" href="/apple-touch-icon.png"/><link rel="icon" href="/favicon.ico"/><link rel="shortcut icon" href="/favicon.ico"/><link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#000000"/><meta name="viewport" content="minimum-scale=1,initial-scale=1,width=device-width"/><base href="/"/><style>/* Basic styles for the splash screen */
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #808080; /* 50% grey */
        z-index: 9999;
      }

      /* Flutuando a logo */
      #logo {
        margin-bottom: 30px; /* Ajuste a margem se necessário */
        max-width: 300px; /* Largura máxima */
        max-height: 150px; /* Altura máxima fixa */
        width: auto;
        height: auto;
        object-fit: contain; /* Mantém proporção */
        animation: float 3s ease-in-out infinite; /* Animação de flutuação */
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      @keyframes float {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px); /* Ajuste a altura do "float" */
        }
        100% {
          transform: translateY(0);
        }
      }

      .loader {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 160px;
        height: auto;
      }

      svg {
        width: 160px;
        height: auto;
      }</style><link rel="icon" href="favicon.ico"><script defer="defer" src="bundle.db6ea4ae43b2ff304e4b.min.js"></script></head><body><div id="splash-screen"><img id="logo" alt="Logo"/><div class="loader"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150"><path fill="none" stroke="#45C04F" stroke-width="15" stroke-linecap="round" stroke-dasharray="300 385" stroke-dashoffset="0" d="M275 75c0 31-27 50-50 50-58 0-92-100-150-100-28 0-50 22-50 50s23 50 50 50c58 0 92-100 150-100 24 0 50 19 50 50Z"><animate attributeName="stroke-dashoffset" calcMode="spline" dur="2" values="685;-685" keySplines="0 0 1 1" repeatCount="indefinite"></animate></path></svg></div></div><div id="root"></div><script>// Carrega a logo do white-label dinamicamente
      (function() {
        var defaultLogo = '/logo.png';
        var logoElement = document.getElementById('logo');

        var applyLogo = function(logoUrl) {
          var finalLogoUrl = logoUrl || defaultLogo;
          var preload = new Image();

          preload.onload = function() {
            if (logoElement) {
              logoElement.src = finalLogoUrl;
              logoElement.style.opacity = '1';
            }
          };

          preload.onerror = function() {
            if (finalLogoUrl !== defaultLogo) {
              applyLogo(defaultLogo);
              return;
            }

            if (logoElement) {
              logoElement.src = defaultLogo;
              logoElement.style.opacity = '1';
            }
          };

          preload.src = finalLogoUrl;
        };

        // Obtém a URL do backend do localStorage ou usa fallback
        var backendUrl = localStorage.getItem('backendUrl');
        
        // Se não tiver no localStorage, tenta inferir da URL atual
        if (!backendUrl) {
          var currentHost = window.location.hostname;
          var currentProtocol = window.location.protocol;
          backendUrl = currentProtocol + '//' + currentHost + ':8080';
        }
        
        // Busca as configurações públicas do backend
        fetch(backendUrl + '/public-settings')
          .then(function(response) {
            if (response.ok) return response.json();
            throw new Error('Falha ao buscar configurações');
          })
          .then(function(settings) {
            if (Array.isArray(settings)) {
              // Procura pela logo (prefere Light)
              var logoSetting = settings.find(function(s) { 
                return s.key === 'appLogoLight' && s.value; 
              }) || settings.find(function(s) { 
                return s.key === 'appLogoDark' && s.value; 
              });
              
              if (logoSetting && logoSetting.value) {
                var logoUrl = logoSetting.value;
                
                // Se não é URL absoluta, monta com o backend
                if (!logoUrl.startsWith('http://') && !logoUrl.startsWith('https://')) {
                  logoUrl = backendUrl + '/public/' + logoUrl;
                }

                applyLogo(logoUrl);
              } else {
                applyLogo(defaultLogo);
              }
              
              // Atualiza o título da página se tiver appName
              var appNameSetting = settings.find(function(s) {
                return s.key === 'appName' && s.value;
              });
              if (appNameSetting && appNameSetting.value) {
                document.title = appNameSetting.value;
              }
              
              // Atualiza o favicon se tiver
              var faviconSetting = settings.find(function(s) {
                return s.key === 'appLogoFavicon' && s.value;
              });
              if (faviconSetting && faviconSetting.value) {
                var faviconUrl = faviconSetting.value;
                if (!faviconUrl.startsWith('http://') && !faviconUrl.startsWith('https://')) {
                  faviconUrl = backendUrl + '/public/' + faviconUrl;
                }
                
                var faviconLinks = document.querySelectorAll("link[rel*='icon']");
                faviconLinks.forEach(function(link) {
                  link.href = faviconUrl;
                });
              }
            }
          })
          .catch(function(error) {
            // Silenciosamente mantém a logo padrão
            applyLogo(defaultLogo);
          });
      })();

      // Simulate progress update (if needed)
      window.finishProgress = () => {
        setTimeout(() => {
          const splashScreen = document.getElementById("splash-screen");
          if (splashScreen) {
            splashScreen.remove();
          }
        }, 500);
      };</script></body></html>
